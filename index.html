<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BRK Value Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e2ddd4;
  --ink: #1a1814;
  --ink2: #6b6560;
  --ink3: #9e9891;
  --green: #2d6a4f;
  --green-bg: #edf7f2;
  --green-light: #52b788;
  --red: #c1440e;
  --red-bg: #fdf0eb;
  --gold: #b5890a;
  --gold-bg: #fdf8ec;
  --accent: #1a3c5e;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

/* Header */
header {
  background: var(--accent);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo-main {
  font-family: var(--mono);
  font-size: 18px;
  color: #fff;
  letter-spacing: 1px;
}

.logo-sub {
  font-family: var(--sans);
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.refresh-btn {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(255,255,255,0.2); }
.refresh-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.last-updated {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

/* Summary bar */
.summary-bar {
  background: var(--accent);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding: 10px 20px;
  display: flex;
  gap: 24px;
  overflow-x: auto;
}

.summary-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stat-value {
  font-family: var(--mono);
  font-size: 16px;
  color: #fff;
}

.stat-value.green { color: #74c69d; }
.stat-value.red   { color: #f4a261; }
.stat-value.gold  { color: #ffd166; }

/* Filter bar */
.filter-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  letter-spacing: 1px;
  margin-right: 4px;
}

.filter-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink2);
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12px;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* Grid */
.grid {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}

/* Stock Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: box-shadow 0.2s;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

.card-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.card-ticker {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--ink);
  font-weight: 500;
}

.card-name {
  font-size: 11px;
  color: var(--ink3);
  margin-top: 2px;
}

.card-price-block { text-align: right; }

.card-price {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--ink);
}

.card-change {
  font-family: var(--mono);
  font-size: 11px;
  margin-top: 2px;
}
.card-change.up   { color: var(--green); }
.card-change.down { color: var(--red); }

/* Value metrics */
.card-metrics {
  padding: 10px 16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  border-bottom: 1px solid var(--border);
}

.metric {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.metric-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.metric-value {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
}

.metric-value.good   { color: var(--green); }
.metric-value.warn   { color: var(--gold); }
.metric-value.bad    { color: var(--red); }
.metric-value.neutral{ color: var(--ink2); }

/* Value score bar */
.value-score-wrap {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.value-score-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.value-score-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.value-score-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
}

.value-bar-bg {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}

.value-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.6s ease;
}

/* Earnings section */
.card-earnings {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}

.earnings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}

.earnings-label {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.earnings-date {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink2);
}

.pm-odds-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}

.pm-odds-label {
  font-family: var(--mono);
  font-size: 9px;
  width: 26px;
  flex-shrink: 0;
}

.pm-bar {
  flex: 1;
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}

.pm-bar-fill {
  height: 100%;
  border-radius: 3px;
}

.pm-pct {
  font-family: var(--mono);
  font-size: 10px;
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}

.pm-signal {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--mono);
  font-size: 9px;
  margin-top: 4px;
}

.pm-signal.beat    { background: var(--green-bg); color: var(--green); }
.pm-signal.miss    { background: var(--red-bg);   color: var(--red); }
.pm-signal.neutral { background: var(--surface2); color: var(--ink3); }
.pm-signal.warn    { background: var(--gold-bg);  color: var(--gold); }

.pm-no-market {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  text-align: center;
  padding: 6px 0;
}

/* Card footer */
.card-footer {
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card-signal {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card-signal.strong-buy  { background: var(--green-bg); color: var(--green); border: 1px solid #b7e4c7; }
.card-signal.buy         { background: #f0f7f3; color: #40916c; border: 1px solid #d8f3dc; }
.card-signal.hold        { background: var(--surface2); color: var(--ink2); border: 1px solid var(--border); }
.card-signal.watch       { background: var(--gold-bg); color: var(--gold); border: 1px solid #ffe08a; }
.card-signal.avoid       { background: var(--red-bg); color: var(--red); border: 1px solid #fbc4ab; }

.load-ticker-btn {
  background: transparent;
  border: none;
  color: var(--ink3);
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  padding: 4px;
  transition: color 0.15s;
}
.load-ticker-btn:hover { color: var(--accent); }

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  height: 14px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Sector tag */
.sector-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--ink3);
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Mobile */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; padding: 12px; gap: 10px; }
  .summary-bar { gap: 16px; }
  .filter-bar { padding: 8px 12px; }
  header { padding: 12px; }
  .logo-main { font-size: 15px; }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink3);
  font-family: var(--mono);
  font-size: 12px;
  grid-column: 1 / -1;
}

.vw-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
}
.vw-badge.high   { background: var(--green-bg); color: var(--green); }
.vw-badge.medium { background: var(--gold-bg);  color: var(--gold); }
.vw-badge.low    { background: var(--red-bg);   color: var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">BRK SCREENER</div>
    <div class="logo-sub">Berkshire Portfolio · Value + Earnings</div>
  </div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated">—</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ REFRESH</button>
  </div>
</header>

<div class="summary-bar">
  <div class="summary-stat">
    <div class="stat-label">Holdings</div>
    <div class="stat-value" id="statTotal">15</div>
  </div>
  <div class="summary-stat">
    <div class="stat-label">Strong Buy</div>
    <div class="stat-value green" id="statBuy">—</div>
  </div>
  <div class="summary-stat">
    <div class="stat-label">Watch</div>
    <div class="stat-value gold" id="statWatch">—</div>
  </div>
  <div class="summary-stat">
    <div class="stat-label">Earnings Active</div>
    <div class="stat-value" id="statEarnings">—</div>
  </div>
  <div class="summary-stat">
    <div class="stat-label">High Conf Beat</div>
    <div class="stat-value green" id="statBeat">—</div>
  </div>
  <div class="summary-stat">
    <div class="stat-label">⚠ Overconf</div>
    <div class="stat-value gold" id="statOverconf">—</div>
  </div>
</div>

<div class="filter-bar">
  <span class="filter-label">SHOW:</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('buy', this)">Strong Buy + Buy</button>
  <button class="filter-btn" onclick="setFilter('earnings', this)">Earnings Active</button>
  <button class="filter-btn" onclick="setFilter('beat', this)">Beat Signal</button>
  <button class="filter-btn" onclick="setFilter('value', this)">Best Value</button>
</div>

<div class="grid" id="grid">
  <!-- Cards injected here -->
</div>

<script>
const API_KEY = 'qw8YLK0T6kmETmJCxe3rrQNPam0jZHZl';

const BRK_HOLDINGS = [
  { ticker: 'AAPL',  name: 'Apple Inc.',               sector: 'Tech' },
  { ticker: 'BAC',   name: 'Bank of America',          sector: 'Finance' },
  { ticker: 'AXP',   name: 'American Express',         sector: 'Finance' },
  { ticker: 'KO',    name: 'Coca-Cola',                sector: 'Consumer' },
  { ticker: 'CVX',   name: 'Chevron',                  sector: 'Energy' },
  { ticker: 'OXY',   name: 'Occidental Petroleum',     sector: 'Energy' },
  { ticker: 'MCO',   name: "Moody's Corp.",            sector: 'Finance' },
  { ticker: 'KHC',   name: 'Kraft Heinz',              sector: 'Consumer' },
  { ticker: 'CB',    name: 'Chubb Ltd.',               sector: 'Insurance' },
  { ticker: 'DVA',   name: 'DaVita Inc.',              sector: 'Healthcare' },
  { ticker: 'VRSN',  name: 'VeriSign',                 sector: 'Tech' },
  { ticker: 'CHTR',  name: 'Charter Comms.',           sector: 'Telecom' },
  { ticker: 'JPM',   name: 'JPMorgan Chase',           sector: 'Finance' },
  { ticker: 'BK',    name: 'Bank of NY Mellon',        sector: 'Finance' },
  { ticker: 'USB',   name: 'U.S. Bancorp',             sector: 'Finance' },
];

let allData    = [];
let activeFilter = 'all';

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmt  = (n, d=2) => n != null && !isNaN(n) ? Number(n).toFixed(d) : '—';
const fmtP = (n) => n != null && !isNaN(n) ? (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%' : '—';
const fmtV = (v) => {
  if (!v) return '—';
  if (v >= 1e9) return (v/1e9).toFixed(1) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(0) + 'K';
  return v;
};
const delay = ms => new Promise(r => setTimeout(r, ms));
const now   = () => new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });

// ── API Calls ─────────────────────────────────────────────────────────────────

async function fetchAllSnapshots() {
  // ONE call gets price data for ALL 15 tickers simultaneously
  const tickers = BRK_HOLDINGS.map(h => h.ticker).join(',');
  const url  = `https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers}&apiKey=${API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  // Returns array of ticker snapshots
  const map = {};
  (data.tickers || []).forEach(t => { map[t.ticker] = t; });
  return map;
}

async function fetchDailyBars(ticker) {
  const to   = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 120);
  const url  = `https://api.polygon.io/v2/aggs/ticker/${ticker}/range/1/day/${from.toISOString().split('T')[0]}/${to.toISOString().split('T')[0]}?adjusted=true&sort=asc&limit=120&apiKey=${API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  return data.results || [];
}

async function fetchPrevClose(ticker) {
  const url  = `https://api.polygon.io/v2/aggs/ticker/${ticker}/prev?adjusted=true&apiKey=${API_KEY}`;
  const res  = await fetch(url);
  const data = await res.json();
  return data.results?.[0] || null;
}

async function fetchPolymarket(ticker, name) {
  const queries = [`${ticker} earnings`, `${name.split(' ')[0]} earnings beat`];
  for (const q of queries) {
    try {
      const url  = `https://gamma-api.polymarket.com/events?active=true&limit=3&keyword=${encodeURIComponent(q)}`;
      const res  = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) continue;
      const data = await res.json();
      if (!Array.isArray(data) || !data.length) continue;
      const relevant = data.filter(e => {
        const t = (e.title || '').toLowerCase();
        return t.includes(ticker.toLowerCase()) || t.includes(name.split(' ')[0].toLowerCase());
      });
      if (relevant.length) return relevant[0];
    } catch(e) { continue; }
  }
  return null;
}

// ── Value Score (snapshot-based, no historical bars needed) ─────────────────
function computeValueScore(snap, bars) {
  let score = 50;
  const scores = {};

  // Use snapshot day data
  const day   = snap?.day || {};
  const price = day.c || snap?.lastTrade?.p;
  const open  = day.o;
  const high  = day.h;
  const low   = day.l;
  const vwap  = day.vw;
  const vol   = day.v;
  const prev  = snap?.prevDay?.c;

  if (!price || !prev) {
    // Fall back to bar-based if we have them
    if (bars && bars.length >= 20) {
      const last   = bars[bars.length - 1];
      const highs  = bars.map(b => b.h);
      const lows   = bars.map(b => b.l);
      const high52 = Math.max(...highs);
      const low52  = Math.min(...lows);
      const range  = high52 - low52 || 1;
      const pos52  = (last.c - low52) / range;
      const pos52Score = Math.round((1 - pos52) * 25) - 12;
      score += pos52Score;
      scores['52W Position'] = { val: Math.round(pos52*100)+'%', pts: pos52Score };

      if (bars.length >= 40) {
        const r = bars.slice(-20).reduce((s,b)=>s+b.c,0)/20;
        const p = bars.slice(-40,-20).reduce((s,b)=>s+b.c,0)/20;
        const m = ((r-p)/p)*100;
        const ms = m < -5 ? 15 : m < 0 ? 8 : m < 5 ? 0 : -8;
        score += ms;
        scores['20d Momentum'] = { val: fmtP(m), pts: ms };
      }

      const avgVol = bars.slice(-20).reduce((s,b)=>s+b.v,0)/20;
      const vr = last.v / avgVol;
      const vs2 = vr > 1.5 ? 10 : vr > 1.1 ? 5 : 0;
      score += vs2;
      scores['Vol vs Avg'] = { val: fmt(vr,1)+'x', pts: vs2 };

      const high52f = high52;
      const low52f  = low52;
      const pos52f  = pos52;
      return { total: Math.max(0,Math.min(100,score)), high52:high52f, low52:low52f, pos52:pos52f, breakdown:scores };
    }
    return { total: 50, breakdown: {} };
  }

  // 1. Daily change — down days near key levels = buying opportunity
  const dayChangePct = ((price - prev) / prev) * 100;
  const dcScore = dayChangePct < -3 ? 18 : dayChangePct < -1 ? 10 :
                  dayChangePct < 0  ? 5  : dayChangePct < 2  ? 0  : -5;
  score += dcScore;
  scores['Day Change'] = { val: fmtP(dayChangePct), pts: dcScore };

  // 2. Price vs VWAP — below VWAP = institutions haven't fully bought yet
  if (vwap && price) {
    const vwapDiff = ((price - vwap) / vwap) * 100;
    const vs = vwapDiff < -2 ? 15 : vwapDiff < 0 ? 8 : vwapDiff < 2 ? 0 : -8;
    score += vs;
    scores['vs VWAP'] = { val: fmtP(vwapDiff), pts: vs };
  }

  // 3. Day position — closing near low of day = weakness / potential value
  if (high && low && price) {
    const range = high - low || 0.01;
    const dayPos = (price - low) / range;
    const dpScore = dayPos < 0.3 ? 12 : dayPos < 0.5 ? 6 : dayPos > 0.8 ? -5 : 0;
    score += dpScore;
    scores['Day Position'] = { val: Math.round(dayPos*100)+'%', pts: dpScore };
  }

  // 4. Volume signal
  if (vol) {
    // Can't compare to avg without bars, but high absolute volume = interest
    const volScore = vol > 20000000 ? 8 : vol > 10000000 ? 4 : 0;
    score += volScore;
    scores['Volume'] = { val: fmtV(vol), pts: volScore };
  }

  // If we also have bars, incorporate 52w position (most valuable signal)
  let high52 = null, low52 = null, pos52 = null;
  if (bars && bars.length >= 20) {
    const highs = bars.map(b => b.h);
    const lows  = bars.map(b => b.l);
    high52 = Math.max(...highs);
    low52  = Math.min(...lows);
    const range52 = high52 - low52 || 1;
    pos52  = (price - low52) / range52;
    const pos52Score = Math.round((1 - pos52) * 20) - 10;
    score += pos52Score;
    scores['52W Position'] = { val: Math.round(pos52*100)+'%', pts: pos52Score };
  }

  return {
    total: Math.max(0, Math.min(100, score)),
    high52, low52, pos52,
    breakdown: scores
  };
}

// ── Polymarket Score ──────────────────────────────────────────────────────────
function parsePolyOdds(event) {
  if (!event?.markets?.length) return null;
  const market = event.markets[0];
  let prices = [], outcomes = ['Yes', 'No'];
  try { prices = JSON.parse(market.outcomePrices || '[]').map(Number); } catch(e) {}
  try { outcomes = JSON.parse(market.outcomes || '["Yes","No"]'); } catch(e) {}

  const yesIdx = outcomes.findIndex(o =>
    o.toLowerCase().includes('yes') || o.toLowerCase().includes('beat')
  );
  if (yesIdx < 0 || prices[yesIdx] == null) return null;

  const yesPct   = Math.round(prices[yesIdx] * 100);
  const vol      = parseFloat(market.volume || 0);
  const liquidity= parseFloat(market.liquidity || 0);
  const endDate  = market.endDate ? new Date(market.endDate) : null;
  const daysOut  = endDate ? Math.round((endDate - Date.now()) / 86400000) : null;
  const question = market.question || event.title || '';

  // VW Confidence Score
  let vwScore = 0;
  if (vol >= 500000)      vwScore += 40;
  else if (vol >= 200000) vwScore += 35;
  else if (vol >= 100000) vwScore += 28;
  else if (vol >= 50000)  vwScore += 20;
  else if (vol >= 10000)  vwScore += 10;
  else if (vol >= 1000)   vwScore += 4;

  const dist = Math.abs(yesPct - 50);
  if (dist >= 15 && dist <= 35)     vwScore += 35;
  else if (dist >= 10 && dist < 15) vwScore += 25;
  else if (dist > 35 && dist <= 42) vwScore += 15;
  else if (dist > 42)               vwScore += 5;
  else                              vwScore += 10;

  if (liquidity >= 100000) vwScore += 15;
  else if (liquidity >= 50000) vwScore += 10;
  else if (liquidity >= 10000) vwScore += 5;

  // Overconfidence penalty
  if (dist > 40 && vol < 50000)  vwScore -= 20;
  if (dist > 45 && vol < 100000) vwScore -= 15;

  vwScore = Math.max(0, Math.min(100, vwScore));
  const sofiFlag = dist > 40 && vol < 50000;

  return { yesPct, vol, daysOut, question, vwScore, sofiFlag };
}

function vwLabel(score) {
  if (score >= 75) return { text: 'HIGH CONF',  cls: 'high' };
  if (score >= 45) return { text: 'MODERATE',   cls: 'medium' };
  return              { text: 'LOW VOL',         cls: 'low' };
}

// ── Overall Signal ────────────────────────────────────────────────────────────
function computeSignal(valueScore, pmOdds) {
  let signal = 'hold';
  let label  = 'HOLD';

  // Value-based signal
  if (valueScore >= 70)      { signal = 'strong-buy'; label = '★ STRONG BUY'; }
  else if (valueScore >= 58) { signal = 'buy';        label = '▲ BUY'; }
  else if (valueScore <= 35) { signal = 'avoid';      label = '✗ AVOID'; }
  else if (valueScore <= 44) { signal = 'watch';      label = '⚠ WATCH'; }

  // Upgrade if Polymarket shows high-confidence beat with decent VW score
  if (pmOdds && pmOdds.yesPct >= 75 && pmOdds.vwScore >= 45) {
    if (signal === 'hold')  { signal = 'buy';        label = '▲ BUY (BEAT SIG)'; }
    if (signal === 'buy')   { signal = 'strong-buy'; label = '★ STRONG BUY (BEAT SIG)'; }
  }

  // Downgrade if Polymarket shows miss risk
  if (pmOdds && (100 - pmOdds.yesPct) >= 65 && pmOdds.vwScore >= 45) {
    if (signal === 'buy' || signal === 'strong-buy') {
      signal = 'watch'; label = '⚠ WATCH (MISS RISK)';
    }
  }

  return { signal, label };
}

// ── Render Card ───────────────────────────────────────────────────────────────
function renderCard(d) {
  const { holding, snap, bars, pmOdds } = d;
  const day       = snap?.day || {};
  const last      = bars?.[bars.length - 1];
  const price     = last?.c || day.c || snap?.lastTrade?.p;
  const prev      = snap?.prevDay?.c || bars?.[bars.length - 2]?.c;
  const change    = price && prev ? price - prev : null;
  const changePct = prev && change ? (change / prev) * 100 : null;

  const vs     = computeValueScore(snap, bars);
  const pm     = parsePolyOdds(pmOdds);
  const sig    = d.signal || computeSignal(vs.total, pm);

  const scoreColor = vs.total >= 65 ? '#2d6a4f' : vs.total >= 50 ? '#b5890a' : '#c1440e';
  const scoreBg    = vs.total >= 65 ? '#edf7f2' : vs.total >= 50 ? '#fdf8ec' : '#fdf0eb';

  const pos52Pct = vs.pos52 != null ? Math.round(vs.pos52 * 100) : null;

  // Price change color
  const upDown = change >= 0 ? 'up' : 'down';
  const changeStr = change != null
    ? `${change >= 0 ? '+' : ''}${fmt(change)} (${fmtP(changePct)})`
    : '—';

  // Metrics
  const high52 = vs.high52 ? '$'+fmt(vs.high52) : day.h ? '$'+fmt(day.h) : '—';
  const low52  = vs.low52  ? '$'+fmt(vs.low52)  : day.l ? '$'+fmt(day.l) : '—';
  const vwap   = last?.vw ? '$'+fmt(last.vw) : day.vw ? '$'+fmt(day.vw) : '—';
  const vol    = last?.v  ? fmtV(last.v)   : day.v  ? fmtV(day.v)  : '—';

  // Momentum
  let momVal = '—', momClass = 'neutral';
  if (bars && bars.length >= 40) {
    const r = bars.slice(-20).reduce((s,b)=>s+b.c,0)/20;
    const p = bars.slice(-40,-20).reduce((s,b)=>s+b.c,0)/20;
    const m = ((r-p)/p)*100;
    momVal  = fmtP(m);
    momClass = m < -3 ? 'good' : m > 5 ? 'bad' : 'neutral';
  }

  // 52w position label
  // Use day position as fallback when 52w range not available
  let posLabel = '—', posClass = 'neutral';
  if (pos52Pct != null) {
    posLabel = pos52Pct <= 25 ? 'NEAR 52W LOW ✓' : pos52Pct >= 75 ? 'NEAR 52W HIGH' : pos52Pct+'% of 52W';
    posClass = pos52Pct <= 25 ? 'good' : pos52Pct >= 75 ? 'bad' : 'neutral';
  } else if (day.h && day.l && price) {
    const dp = Math.round(((price - day.l) / (day.h - day.l || 1)) * 100);
    posLabel = dp <= 25 ? 'DAY LOW ✓' : dp >= 75 ? 'DAY HIGH' : dp+'% of day';
    posClass = dp <= 25 ? 'good' : dp >= 75 ? 'bad' : 'neutral';
  }

  // Polymarket section
  let pmHtml = '<div class="pm-no-market">No active earnings market</div>';
  if (pm) {
    const noPct    = 100 - pm.yesPct;
    const vwl      = vwLabel(pm.vwScore);
    const pmSigCls = pm.yesPct >= 75 ? 'beat' : pm.yesPct <= 40 ? 'miss' :
                     pm.sofiFlag ? 'warn' : 'neutral';
    const pmSigTxt = pm.yesPct >= 75 ? `${pm.yesPct}% BEAT` :
                     pm.yesPct <= 40 ? `${noPct}% MISS RISK` :
                     pm.sofiFlag     ? '⚠ OVERCONF FLAG' : 'UNCERTAIN';
    const daysStr  = pm.daysOut != null ? (pm.daysOut <= 0 ? 'resolving' : `${pm.daysOut}d`) : '';

    pmHtml = `
      <div class="pm-odds-bar">
        <div class="pm-odds-label" style="color:var(--green);">YES</div>
        <div class="pm-bar"><div class="pm-bar-fill" style="width:${pm.yesPct}%;background:var(--green-light);"></div></div>
        <div class="pm-pct" style="color:var(--green);">${pm.yesPct}%</div>
      </div>
      <div class="pm-odds-bar">
        <div class="pm-odds-label" style="color:var(--red);">NO</div>
        <div class="pm-bar"><div class="pm-bar-fill" style="width:${noPct}%;background:#e07050;"></div></div>
        <div class="pm-pct" style="color:var(--red);">${noPct}%</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
        <span class="pm-signal ${pmSigCls}">${pmSigTxt}</span>
        <div style="display:flex;align-items:center;gap:4px;">
          <span class="vw-badge ${vwl.cls}">${vwl.text} ${pm.vwScore}/100</span>
          ${daysStr ? `<span style="font-family:var(--mono);font-size:9px;color:var(--ink3);">${daysStr}</span>` : ''}
        </div>
      </div>
      ${pm.sofiFlag ? `<div style="font-family:var(--mono);font-size:8px;color:var(--red);margin-top:4px;">⚠ Extreme odds with thin volume — see SOFI Apr 2026</div>` : ''}
    `;
  }

  return `
    <div class="card" data-ticker="${holding.ticker}" data-signal="${sig.signal}" data-has-pm="${pm ? 'true' : 'false'}" data-score="${vs.total}">
      <div class="card-header">
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="card-ticker">${holding.ticker}</div>
            <span class="sector-tag">${holding.sector}</span>
          </div>
          <div class="card-name">${holding.name}</div>
        </div>
        <div class="card-price-block">
          <div class="card-price">${price ? '$' + fmt(price) : '—'}</div>
          <div class="card-change ${upDown}">${changeStr}</div>
        </div>
      </div>

      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">52W Range</div>
          <div class="metric-value ${posClass}">${posLabel}</div>
        </div>
        <div class="metric">
          <div class="metric-label">20d Momentum</div>
          <div class="metric-value ${momClass}">${momVal}</div>
        </div>
        <div class="metric">
          <div class="metric-label">vs VWAP</div>
          <div class="metric-value">${vwap}</div>
        </div>
        <div class="metric">
          <div class="metric-label">52W High</div>
          <div class="metric-value neutral">${high52}</div>
        </div>
        <div class="metric">
          <div class="metric-label">52W Low</div>
          <div class="metric-value neutral">${low52}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Volume</div>
          <div class="metric-value neutral">${vol}</div>
        </div>
      </div>

      <div class="value-score-wrap">
        <div class="value-score-header">
          <div class="value-score-label">Value Score</div>
          <div class="value-score-num" style="color:${scoreColor};">${vs.total}/100</div>
        </div>
        <div class="value-bar-bg">
          <div class="value-bar-fill" style="width:${vs.total}%;background:${scoreColor};"></div>
        </div>
      </div>

      <div class="card-earnings">
        <div class="earnings-header">
          <div class="earnings-label">Polymarket Earnings Odds</div>
        </div>
        ${pmHtml}
      </div>

      <div class="card-footer">
        <span class="card-signal ${sig.signal}">${sig.label}</span>
        <button class="load-ticker-btn" onclick="copyTicker('${holding.ticker}')">copy ticker ↗</button>
      </div>
    </div>
  `;
}

function copyTicker(ticker) {
  navigator.clipboard?.writeText(ticker).then(() => {
    // Brief visual feedback
    const btn = event.target;
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy ticker ↗', 1500);
  }).catch(() => {
    // Fallback: show alert with ticker
    alert(ticker);
  });
}

// ── Load All Data ─────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  allData = [];

  const grid = document.getElementById('grid');
  document.getElementById('lastUpdated').textContent = 'Loading...';

  // Show skeleton cards
  grid.innerHTML = BRK_HOLDINGS.map(h => `
    <div class="card" style="padding:20px;" id="card-${h.ticker}">
      <div style="font-family:var(--mono);font-size:18px;color:var(--ink3);margin-bottom:8px;">${h.ticker} <span style="font-size:11px;">${h.name}</span></div>
      <div class="skeleton" style="margin-bottom:8px;height:12px;"></div>
      <div class="skeleton" style="width:70%;margin-bottom:8px;height:12px;"></div>
      <div class="skeleton" style="width:50%;height:12px;"></div>
    </div>
  `).join('');

  // ── ONE call: snapshot for all 15 tickers ─────────────────────────────────
  let snapshots = {};
  try {
    snapshots = await fetchAllSnapshots();
    document.getElementById('lastUpdated').textContent = 'Prices loaded — fetching details...';
  } catch(e) {
    console.warn('Snapshot error:', e);
  }

  // Build allData from snapshots immediately
  BRK_HOLDINGS.forEach(h => {
    const snap = snapshots[h.ticker] || null;
    allData.push({ holding: h, snap, bars: [], pmOdds: null,
      signal: { signal:'hold', label:'HOLD' } });
  });
  renderCards();

  // ── Fetch bars one at a time with 13s gap (5 req/min = 12s apart) ─────────
  // But use a gentle approach: fetch each ticker's bars sequentially
  // with a 13-second gap to stay under the rate limit
  // Show progress in the header
  for (let i = 0; i < BRK_HOLDINGS.length; i++) {
    const h = BRK_HOLDINGS[i];
    document.getElementById('lastUpdated').textContent =
      `Loading ${h.ticker} history (${i+1}/15)...`;
    try {
      const bars = await fetchDailyBars(h.ticker);
      const idx  = allData.findIndex(d => d.holding.ticker === h.ticker);
      if (idx >= 0) {
        allData[idx].bars = bars;
        const vs = computeValueScore(allData[idx].snap, bars);
        allData[idx].signal = computeSignal(vs.total, parsePolyOdds(allData[idx].pmOdds));
        renderCards();
      }
    } catch(e) { console.warn(`Bars error ${h.ticker}:`, e); }

    // 13s between each fetch = ~4.6 req/min, safely under limit
    if (i < BRK_HOLDINGS.length - 1) {
      for (let s = 12; s > 0; s--) {
        document.getElementById('lastUpdated').textContent =
          `${h.ticker} done · next in ${s}s (${i+2}/15)`;
        await delay(1000);
      }
    }
  }

  // ── Polymarket: one at a time, 400ms apart ────────────────────────────────
  document.getElementById('lastUpdated').textContent = 'Checking Polymarket odds...';
  for (let i = 0; i < BRK_HOLDINGS.length; i++) {
    const h = BRK_HOLDINGS[i];
    try {
      const pm  = await fetchPolymarket(h.ticker, h.name);
      const idx = allData.findIndex(d => d.holding.ticker === h.ticker);
      if (idx >= 0 && pm) {
        allData[idx].pmOdds = pm;
        const vs = computeValueScore(allData[idx].snap, allData[idx].bars);
        allData[idx].signal = computeSignal(vs.total, parsePolyOdds(pm));
        renderCards();
      }
    } catch(e) {}
    await delay(400);
  }

  // Final summary stats
  updateSummary();
  document.getElementById('lastUpdated').textContent = 'Updated ' + now();
  btn.classList.remove('spinning');
}

function updateSummary() {
  let buys=0, watches=0, earnings=0, beats=0, overconfs=0;
  allData.forEach(d => {
    if (d.signal.signal==='strong-buy'||d.signal.signal==='buy') buys++;
    if (d.signal.signal==='watch') watches++;
    const pm = parsePolyOdds(d.pmOdds);
    if (pm) {
      earnings++;
      if (pm.yesPct>=75&&pm.vwScore>=45) beats++;
      if (pm.sofiFlag) overconfs++;
    }
  });
  document.getElementById('statBuy').textContent     = buys;
  document.getElementById('statWatch').textContent   = watches;
  document.getElementById('statEarnings').textContent= earnings;
  document.getElementById('statBeat').textContent    = beats;
  document.getElementById('statOverconf').textContent= overconfs;
}


function renderCards() {
  const grid = document.getElementById('grid');
  let cards  = allData;

  // Apply filter
  if (activeFilter === 'buy') {
    cards = cards.filter(d => d.signal.signal === 'strong-buy' || d.signal.signal === 'buy');
  } else if (activeFilter === 'earnings') {
    cards = cards.filter(d => d.pmOdds != null);
  } else if (activeFilter === 'beat') {
    cards = cards.filter(d => {
      const pm = parsePolyOdds(d.pmOdds);
      return pm && pm.yesPct >= 70 && pm.vwScore >= 45;
    });
  } else if (activeFilter === 'value') {
    cards = [...cards].sort((a, b) => {
      const va = computeValueScore(null, a.bars, a.prevClose).total;
      const vb = computeValueScore(null, b.bars, b.prevClose).total;
      return vb - va;
    });
  }

  if (cards.length === 0 && allData.length > 0) {
    grid.innerHTML = `<div class="empty-state">No stocks match the current filter.</div>`;
    return;
  }

  grid.innerHTML = cards.map(d => renderCard(d)).join('');
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
