<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BRK Value Screener</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd4;--ink:#1a1814;--ink2:#6b6560;--ink3:#9e9891;--green:#2d6a4f;--green-bg:#edf7f2;--green-light:#52b788;--red:#c1440e;--red-bg:#fdf0eb;--gold:#b5890a;--gold-bg:#fdf8ec;--accent:#1a3c5e;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;}
header{background:var(--accent);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.logo-main{font-family:var(--mono);font-size:17px;color:#fff;letter-spacing:1px;}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
.last-upd{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.35);}
.refresh-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.8);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:1px;}
.refresh-btn.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.summary-bar{background:var(--accent);border-top:1px solid rgba(255,255,255,0.1);padding:10px 20px;display:flex;gap:20px;overflow-x:auto;}
.s-stat{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.s-lbl{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,0.35);letter-spacing:1px;text-transform:uppercase;}
.s-val{font-family:var(--mono);font-size:15px;color:#fff;}
.s-val.g{color:#74c69d;}.s-val.r{color:#f4a261;}.s-val.y{color:#ffd166;}
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.f-lbl{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:1px;margin-right:4px;}
.f-btn{background:transparent;border:1px solid var(--border);color:var(--ink2);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--sans);font-size:12px;transition:all 0.15s;}
.f-btn:hover{border-color:var(--accent);color:var(--accent);}
.f-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.grid{padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:box-shadow 0.2s;}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.07);}
.card-header{padding:13px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border);}
.ticker{font-family:var(--mono);font-size:19px;color:var(--ink);font-weight:500;}
.s-tag{font-family:var(--mono);font-size:8px;color:var(--ink3);background:var(--surface2);padding:2px 6px;border-radius:3px;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.cname{font-size:11px;color:var(--ink3);margin-top:2px;}
.price-blk{text-align:right;}
.cprice{font-family:var(--mono);font-size:19px;}
.cchg{font-family:var(--mono);font-size:11px;margin-top:2px;}
.cchg.up{color:var(--green);}.cchg.dn{color:var(--red);}
.sec-title{font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px 4px;background:var(--surface2);border-bottom:1px solid var(--border);}
.fund-grid{padding:10px 16px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;border-bottom:1px solid var(--border);}
.fund-item{display:flex;flex-direction:column;gap:2px;}
.f-lbl2{font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:0.5px;text-transform:uppercase;}
.f-val{font-family:var(--mono);font-size:12px;}
.f-val.g{color:var(--green);}.f-val.r{color:var(--red);}.f-val.y{color:var(--gold);}.f-val.n{color:var(--ink2);}
.score-wrap{padding:10px 16px;border-bottom:1px solid var(--border);}
.score-hdr{display:flex;justify-content:space-between;margin-bottom:5px;}
.score-lbl{font-family:var(--mono);font-size:8px;color:var(--ink3);letter-spacing:1px;text-transform:uppercase;}
.score-num{font-family:var(--mono);font-size:11px;font-weight:500;}
.bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease;}
.pm-section{padding:10px 16px;border-bottom:1px solid var(--border);}
.pm-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.pm-lbl{font-family:var(--mono);font-size:8px;width:24px;flex-shrink:0;}
.pm-bar{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.pm-fill{height:100%;border-radius:3px;}
.pm-pct{font-family:var(--mono);font-size:9px;width:28px;text-align:right;flex-shrink:0;}
.pm-sig{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-family:var(--mono);font-size:9px;margin-top:4px;}
.pm-sig.beat{background:var(--green-bg);color:var(--green);}
.pm-sig.miss{background:var(--red-bg);color:var(--red);}
.pm-sig.warn{background:var(--gold-bg);color:var(--gold);}
.pm-sig.n{background:var(--surface2);color:var(--ink3);}
.pm-none{font-family:var(--mono);font-size:9px;color:var(--ink3);text-align:center;padding:6px 0;}
.vw-badge{font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:3px;}
.vw-badge.h{background:var(--green-bg);color:var(--green);}
.vw-badge.m{background:var(--gold-bg);color:var(--gold);}
.vw-badge.l{background:var(--red-bg);color:var(--red);}
.surp-dot{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:500;flex-shrink:0;}
.surp-dot.beat{background:var(--green-bg);color:var(--green);}
.surp-dot.miss{background:var(--red-bg);color:var(--red);}
.surp-dot.meet{background:var(--surface2);color:var(--ink3);}
.ins-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ins-name{font-family:var(--mono);font-size:9px;color:var(--ink2);}
.ins-badge{font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:3px;}
.ins-badge.buy{background:var(--green-bg);color:var(--green);}
.ins-badge.sell{background:var(--red-bg);color:var(--red);}
.div-row{padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.div-info{font-family:var(--mono);font-size:10px;color:var(--ink2);}
.div-badge{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:10px;}
.div-badge.aristocrat{background:var(--gold-bg);color:var(--gold);}
.div-badge.grower{background:var(--green-bg);color:var(--green);}
.div-badge.none{background:var(--surface2);color:var(--ink3);}
.card-footer{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.sig-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:0.5px;}
.sig-badge.strong-buy{background:var(--green-bg);color:var(--green);border:1px solid #b7e4c7;}
.sig-badge.buy{background:#f0f7f3;color:#40916c;border:1px solid #d8f3dc;}
.sig-badge.hold{background:var(--surface2);color:var(--ink2);border:1px solid var(--border);}
.sig-badge.watch{background:var(--gold-bg);color:var(--gold);border:1px solid #ffe08a;}
.sig-badge.avoid{background:var(--red-bg);color:var(--red);border:1px solid #fbc4ab;}
.copy-btn{background:transparent;border:none;color:var(--ink3);font-family:var(--mono);font-size:9px;cursor:pointer;padding:4px;}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-family:var(--mono);font-size:12px;grid-column:1/-1;}
@media(max-width:600px){.grid{grid-template-columns:1fr;padding:10px;}.summary-bar{gap:14px;}header{padding:12px;}.logo-main{font-size:14px;}}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-main">BRK SCREENER</div>
    <div class="logo-sub">Berkshire Portfolio · Value + Fundamentals + Earnings</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="last-upd" id="lastUpd">—</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">↻ REFRESH</button>
  </div>
</header>

<div class="summary-bar">
  <div class="s-stat"><div class="s-lbl">Holdings</div><div class="s-val">15</div></div>
  <div class="s-stat"><div class="s-lbl">Strong Buy</div><div class="s-val g" id="sBuy">—</div></div>
  <div class="s-stat"><div class="s-lbl">Watch</div><div class="s-val y" id="sWatch">—</div></div>
  <div class="s-stat"><div class="s-lbl">Avoid</div><div class="s-val r" id="sAvoid">—</div></div>
  <div class="s-stat"><div class="s-lbl">Earnings Active</div><div class="s-val" id="sEarnings">—</div></div>
  <div class="s-stat"><div class="s-lbl">Beat Signal</div><div class="s-val g" id="sBeat">—</div></div>
  <div class="s-stat"><div class="s-lbl">Insider Buying</div><div class="s-val g" id="sInsider">—</div></div>

</div>

<div class="filter-bar">
  <span class="f-lbl">SHOW:</span>
  <button class="f-btn active" onclick="setFilter('all',this)">All</button>
  <button class="f-btn" onclick="setFilter('buy',this)">Buy Signals</button>
  <button class="f-btn" onclick="setFilter('value',this)">Best Value</button>
  <button class="f-btn" onclick="setFilter('earnings',this)">Earnings Active</button>
  <button class="f-btn" onclick="setFilter('beat',this)">Beat Signal</button>
  <button class="f-btn" onclick="setFilter('insider',this)">Insider Buying</button>
  <button class="f-btn" onclick="setFilter('dividend',this)">Div Aristocrats</button>
</div>

<div class="grid" id="grid"></div>

<script>
const POLY_KEY='qw8YLK0T6kmETmJCxe3rrQNPam0jZHZl';
const FMP_KEY='QpKQuSOpEfIEMfaWzSi5cKDI9HCZQbKp';
const FMP='https://financialmodelingprep.com/stable';

const HOLDINGS=[
  {t:'AAPL',n:'Apple Inc.',s:'Tech'},
  {t:'BAC',n:'Bank of America',s:'Finance'},
  {t:'AXP',n:'American Express',s:'Finance'},
  {t:'KO',n:'Coca-Cola',s:'Consumer'},
  {t:'CVX',n:'Chevron',s:'Energy'},
  {t:'OXY',n:'Occidental Petroleum',s:'Energy'},
  {t:'MCO',n:"Moody's Corp.",s:'Finance'},
  {t:'KHC',n:'Kraft Heinz',s:'Consumer'},
  {t:'CB',n:'Chubb Ltd.',s:'Insurance'},
  {t:'DVA',n:'DaVita Inc.',s:'Healthcare'},
  {t:'VRSN',n:'VeriSign',s:'Tech'},
  {t:'CHTR',n:'Charter Comms.',s:'Telecom'},
  {t:'JPM',n:'JPMorgan Chase',s:'Finance'},
  {t:'BK',n:'Bank of NY Mellon',s:'Finance'},
  {t:'USB',n:'U.S. Bancorp',s:'Finance'},
];

let allData=[],activeFilter='all';

const f2=n=>(n!=null&&!isNaN(n))?Number(n).toFixed(2):'—';
const f1=n=>(n!=null&&!isNaN(n))?Number(n).toFixed(1):'—';
const pct=n=>(n!=null&&!isNaN(n))?(n>=0?'+':'')+Number(n).toFixed(2)+'%':'—';
const fmtV=v=>!v?'—':v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':String(v);
const nowStr=()=>new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
const delay=ms=>new Promise(r=>setTimeout(r,ms));

async function fmpGet(path){
  const sep=path.includes('?')?'&':'?';
  const res=await fetch(`${FMP}/${path}${sep}apikey=${FMP_KEY}`);
  if(!res.ok)throw new Error(`FMP ${res.status}`);
  return res.json();
}

async function polySnap(tickers){
  // Try Polygon snapshot first, fall back to FMP quote
  try {
    const res=await fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers?tickers=${tickers.join(',')}&apiKey=${POLY_KEY}`);
    const data=await res.json();
    const map={};
    (data.tickers||[]).forEach(t=>map[t.ticker]=t);
    if(Object.keys(map).length>0) return map;
  } catch(e) { console.warn('Polygon snapshot failed, using FMP quotes'); }
  
  // Fallback: FMP batch quote (one call for all tickers)
  try {
    const symbols = tickers.join(',');
    const res = await fetch(`${FMP}/quote?symbol=${symbols}&apikey=${FMP_KEY}`);
    const data = await res.json();
    const map = {};
    if(Array.isArray(data)) {
      data.forEach(q => {
        // Convert FMP quote format to match what we expect
        map[q.symbol] = {
          ticker: q.symbol,
          day: {
            c: q.price, o: q.open, h: q.dayHigh, l: q.dayLow,
            v: q.volume, vw: null
          },
          prevDay: { c: q.previousClose },
          lastTrade: { p: q.price },
          // Also store FMP-specific fields
          _fmp: {
            pe: q.pe, eps: q.eps, marketCap: q.marketCap,
            high52: q.yearHigh, low52: q.yearLow,
            change: q.change, changePct: q.changesPercentage
          }
        };
      });
    }
    return map;
  } catch(e) {
    console.warn('FMP quote also failed:', e);
    return {};
  }
}

async function fmpSafe(path){
  // Wrapper with retry on rate limit
  try {
    const data = await fmpGet(path);
    return data;
  } catch(e) {
    if (e.message?.includes('429') || e.message?.includes('403')) {
      await delay(15000); // wait 15s on rate limit
      try { return await fmpGet(path); } catch(e2) { return null; }
    }
    return null;
  }
}

async function fetchFundamentals(ticker){
  // Sequential fetches with small gaps — prevents burst rate limiting
  // Priority order: most important data first
  const safe = async (path) => {
    try { return await fmpGet(path); } catch(e) { return null; }
  };

  // Batch 1: Core valuation metrics (2 calls)
  const [metricsRaw, ratiosRaw] = await Promise.allSettled([
    safe(`key-metrics-ttm?symbol=${ticker}`),
    safe(`ratios-ttm?symbol=${ticker}`),
  ]).then(r=>r.map(x=>x.status==='fulfilled'?x.value:null));
  await delay(1000);

  // Batch 2: Historical + qualitative (3 calls)
  const [incomeRaw, surprisesRaw, insiderRaw] = await Promise.allSettled([
    safe(`income-statement?symbol=${ticker}&limit=8`),
    safe(`earnings-surprises?symbol=${ticker}`),
    safe(`insider-trading?symbol=${ticker}&limit=10`),
  ]).then(r=>r.map(x=>x.status==='fulfilled'?x.value:null));
  await delay(1000);

  // Batch 3: Supplementary (2 calls)
  const [dividendsRaw, profileRaw] = await Promise.allSettled([
    safe(`dividends?symbol=${ticker}`),
    safe(`profile?symbol=${ticker}`),
  ]).then(r=>r.map(x=>x.status==='fulfilled'?x.value:null));

  const metrics = Array.isArray(metricsRaw) ? metricsRaw[0] : null;
  const ratios  = Array.isArray(ratiosRaw)  ? ratiosRaw[0]  : null;

  // Debug: log all keys to console so we can see field names
  if (metrics) console.log(`[FMP metrics ${ticker}]`, Object.keys(metrics).filter(k=>metrics[k]!=null&&metrics[k]!==0));
  if (ratios)  console.log(`[FMP ratios ${ticker}]`,  Object.keys(ratios).filter(k=>ratios[k]!=null&&ratios[k]!==0));

  return{
    metrics,
    ratios,
    income:    Array.isArray(incomeRaw)    ? incomeRaw    : [],
    surprises: Array.isArray(surprisesRaw) ? surprisesRaw : [],
    insider:   Array.isArray(insiderRaw)   ? insiderRaw   : [],
    dividends: dividendsRaw?.historical    ? dividendsRaw : null,
    profile:   Array.isArray(profileRaw)   ? profileRaw[0]: null,
  };
}

async function fetchPolymarket(ticker,name){
  try{
    const res=await fetch(`https://gamma-api.polymarket.com/events?active=true&limit=5&keyword=${encodeURIComponent(ticker+' earnings')}`,{headers:{'Accept':'application/json'}});
    if(!res.ok)return null;
    const data=await res.json();
    if(!Array.isArray(data)||!data.length)return null;
    return data.find(e=>(e.title||'').toLowerCase().includes(ticker.toLowerCase()))||data[0];
  }catch(e){return null;}
}

function parsePM(event){
  if(!event?.markets?.length)return null;
  const m=event.markets[0];
  let prices=[],outcomes=['Yes','No'];
  try{prices=JSON.parse(m.outcomePrices||'[]').map(Number);}catch(e){}
  try{outcomes=JSON.parse(m.outcomes||'["Yes","No"]');}catch(e){}
  const yi=outcomes.findIndex(o=>o.toLowerCase().includes('yes')||o.toLowerCase().includes('beat'));
  if(yi<0||prices[yi]==null)return null;
  const yesPct=Math.round(prices[yi]*100);
  const vol=parseFloat(m.volume||0);
  const liq=parseFloat(m.liquidity||0);
  const dist=Math.abs(yesPct-50);
  let vw=0;
  vw+=vol>=500000?40:vol>=200000?35:vol>=100000?28:vol>=50000?20:vol>=10000?10:vol>=1000?4:0;
  vw+=dist>=15&&dist<=35?35:dist>=10?25:dist>42?5:10;
  vw+=liq>=100000?15:liq>=50000?10:liq>=10000?5:0;
  if(dist>40&&vol<50000)vw-=20;
  vw=Math.max(0,Math.min(100,vw));
  const daysOut=m.endDate?Math.round((new Date(m.endDate)-Date.now())/86400000):null;
  return{yesPct,vol,vw,daysOut,sofi:dist>40&&vol<50000};
}

function valueScore(snap,fund){
  let s=50;
  const day=snap?.day||{};
  const price=day.c||snap?.lastTrade?.p;
  const m=fund?.metrics||{};
  const r=fund?.ratios||{};
  const inc=fund?.income||[];

  // Try multiple field name variants — FMP stable API uses different names than v3
  const pe = m.peRatioTTM || m.peRatio || r.peRatioTTM || r.priceEarningsRatioTTM || r.peRatio || prof.pe;
  if(pe&&pe>0)s+=pe<15?20:pe<20?12:pe<25?5:pe<35?0:-10;

  const pb = m.priceToBookValueTTM || m.pbRatioTTM || m.priceToBookRatio ||
             r.priceToBookRatioTTM || r.pbRatioTTM || r.priceToBook || prof.priceToBook;
  if(pb&&pb>0)s+=pb<1.5?10:pb<3?5:pb<5?0:-5;

  const roe = ((m.roeTTM || m.returnOnEquityTTM || m.roe ||
               r.returnOnEquityTTM || r.roeTTM || r.roe || 0))*100;
  if(roe)s+=roe>20?15:roe>15?10:roe>8?4:roe>0?0:-8;

  const roic = ((m.roicTTM || m.returnOnInvestedCapitalTTM || m.roic ||
                r.returnOnInvestedCapitalTTM || r.roicTTM || 0))*100;
  if(roic)s+=roic>15?15:roic>10?10:roic>5?4:roic>0?0:-5;

  const de = m.debtToEquityTTM || m.debtToEquity || r.debtEquityRatioTTM ||
             r.debtToEquityRatioTTM || r.debtEquityRatio;
  if(de!=null&&de>=0)s+=de<0.5?10:de<1?6:de<2?2:de<3?-3:-8;

  const fcfY = ((m.freeCashFlowYieldTTM || m.fcfYieldTTM || m.freeCashFlowYield ||
                r.freeCashFlowYieldTTM || 0))*100;
  if(fcfY)s+=fcfY>8?10:fcfY>5?7:fcfY>3?4:fcfY>1?1:0;

  if(inc.length>=4){
    const eps=inc.slice(0,4).map(i=>i.eps||0).filter(e=>e!==0);
    if(eps.length>=2){
      const g=(eps[0]-eps[eps.length-1])/Math.abs(eps[eps.length-1]||1)*100;
      s+=g>20?10:g>10?6:g>0?3:g>-10?0:-8;
    }
  }

  if(day.vw&&price){const vd=((price-day.vw)/day.vw)*100;s+=vd<-2?5:vd<0?2:vd<2?0:-3;}
  // Use 52w range if available from FMP quote
  const fmp=snap?._fmp||{};
  const h52=fmp.high52||day.h;
  const l52=fmp.low52||day.l;
  if(h52&&l52&&price){
    const rng=h52-l52||0.01;
    const pos=(price-l52)/rng;
    s+=pos<0.25?12:pos<0.4?6:pos>0.8?-8:pos>0.65?-4:0;
  }
  // Use FMP PE if fundamentals not loaded yet
  if(!pe&&fmp.pe&&fmp.pe>0){const fpe=fmp.pe;s+=fpe<15?18:fpe<20?10:fpe<25?4:fpe<35?0:-8;}

  return Math.max(0,Math.min(100,Math.round(s)));
}

function getSignal(score,pm,insiderBuys,surpriseBeats,total){
  let sig='hold',lbl='HOLD';
  if(score>=72){sig='strong-buy';lbl='★ STRONG BUY';}
  else if(score>=60){sig='buy';lbl='▲ BUY';}
  else if(score<=32){sig='avoid';lbl='✗ AVOID';}
  else if(score<=42){sig='watch';lbl='⚠ WATCH';}

  if(insiderBuys>0&&score>=55&&sig==='hold'){sig='buy';lbl='▲ BUY (INSIDER)';}
  if(insiderBuys>0&&sig==='buy'){sig='strong-buy';lbl='★ STRONG BUY (INSIDER)';}

  if(pm&&pm.yesPct>=75&&pm.vw>=45){
    if(sig==='hold'){sig='buy';lbl='▲ BUY (BEAT SIG)';}
    if(sig==='buy'){sig='strong-buy';lbl='★ STRONG BUY (BEAT SIG)';}
  }
  if(pm&&(100-pm.yesPct)>=65&&pm.vw>=45){
    if(sig==='strong-buy'||sig==='buy'){sig='watch';lbl='⚠ WATCH (MISS RISK)';}
  }
  return{sig,lbl};
}

function renderCard(d){
  const{holding,snap,fund,pmOdds}=d;
  const day=snap?.day||{};
  const fmpQ=snap?._fmp||{};
  const price=day.c||snap?.lastTrade?.p;
  const prev=snap?.prevDay?.c;
  // Use FMP change data if available (more accurate)
  const chg=fmpQ.change!=null?fmpQ.change:(price&&prev?price-prev:null);
  const chgP=fmpQ.changePct!=null?fmpQ.changePct:(prev&&chg?(chg/prev)*100:null);
  const high52=fmpQ.high52||null;
  const low52=fmpQ.low52||null;
  const m=fund?.metrics||{};
  const r=fund?.ratios||{};
  const prof=fund?.profile||{};

  const score=valueScore(snap,fund);
  const pm=parsePM(pmOdds);

  const insiders=fund?.insider||[];
  const insiderBuys=insiders.filter(i=>(i.transactionType||'').toLowerCase().includes('p-purchase')||(i.transactionType||'').toLowerCase().includes('buy'));
  const insiderSells=insiders.filter(i=>(i.transactionType||'').toLowerCase().includes('s-sale'));
  const surps=fund?.surprises||[];
  const surpBeats=surps.filter(s=>s.actualEarningResult>s.estimatedEarning).length;

  const divYield=((m.dividendYieldTTM||m.dividendYield||r.dividendYieldTTM||r.dividendYield||prof.lastDiv/((snap?.day?.c)||1)||0))*100;
  const payoutR=((m.payoutRatioTTM||m.payoutRatio||r.payoutRatioTTM||r.payoutRatio||0))*100;
  const divHistLen=fund?.dividends?.historical?.length||0;
  const isAristocrat=divHistLen>80&&divYield>1;

  const{sig,lbl}=getSignal(score,pm,insiderBuys.length,surpBeats,surps.length);

  const pe = m.peRatioTTM||m.peRatio||r.peRatioTTM||r.priceEarningsRatioTTM||r.peRatio||prof.pe;
  const pb = m.priceToBookValueTTM||m.pbRatioTTM||m.priceToBookRatio||r.priceToBookRatioTTM||r.pbRatioTTM||r.priceToBook||prof.priceToBook;
  const roe = ((m.roeTTM||m.returnOnEquityTTM||m.roe||r.returnOnEquityTTM||r.roeTTM||r.roe||0))*100;
  const roic = ((m.roicTTM||m.returnOnInvestedCapitalTTM||m.roic||r.returnOnInvestedCapitalTTM||r.roicTTM||0))*100;
  const de = m.debtToEquityTTM||m.debtToEquity||r.debtEquityRatioTTM||r.debtToEquityRatioTTM||r.debtEquityRatio;
  const fcfY = ((m.freeCashFlowYieldTTM||m.fcfYieldTTM||m.freeCashFlowYield||r.freeCashFlowYieldTTM||0))*100;

  const scColor=score>=65?'#2d6a4f':score>=50?'#b5890a':'#c1440e';

  const peC=pe?(pe<20?'g':pe<30?'n':'r'):'n';
  const pbC=pb?(pb<2?'g':pb<4?'n':'r'):'n';
  const roeC=roe>15?'g':roe>8?'n':roe>0?'r':'n';
  const roicC=roic>12?'g':roic>6?'n':roic>0?'r':'n';
  const deC=de!=null?(de<1?'g':de<2?'n':'r'):'n';
  const fcfC=fcfY>5?'g':fcfY>2?'n':'n';
  const divC=divYield>3?'g':divYield>1?'n':'n';

  // Polymarket HTML
  let pmHtml='<div class="pm-none">No active earnings market</div>';
  if(pm){
    const no=100-pm.yesPct;
    const vwL=pm.vw>=65?{t:'HIGH CONF',c:'h'}:pm.vw>=40?{t:'MODERATE',c:'m'}:{t:'LOW VOL',c:'l'};
    const pmSig=pm.yesPct>=75?'beat':pm.yesPct<=40?'miss':pm.sofi?'warn':'n';
    const pmTxt=pm.yesPct>=75?pm.yesPct+'% BEAT':pm.yesPct<=40?no+'% MISS RISK':pm.sofi?'⚠ OVERCONF':'UNCERTAIN';
    const dStr=pm.daysOut!=null?(pm.daysOut<=0?'resolving':pm.daysOut+'d'):'';
    pmHtml=`
      <div class="pm-bar-row">
        <div class="pm-lbl" style="color:var(--green)">YES</div>
        <div class="pm-bar"><div class="pm-fill" style="width:${pm.yesPct}%;background:var(--green-light)"></div></div>
        <div class="pm-pct" style="color:var(--green)">${pm.yesPct}%</div>
      </div>
      <div class="pm-bar-row">
        <div class="pm-lbl" style="color:var(--red)">NO</div>
        <div class="pm-bar"><div class="pm-fill" style="width:${no}%;background:#e07050"></div></div>
        <div class="pm-pct" style="color:var(--red)">${no}%</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:5px;">
        <span class="pm-sig ${pmSig}">${pmTxt}</span>
        <div style="display:flex;gap:4px;align-items:center;">
          <span class="vw-badge ${vwL.c}">${vwL.t} ${pm.vw}/100</span>
          ${dStr?`<span style="font-family:var(--mono);font-size:8px;color:var(--ink3)">${dStr}</span>`:''}
        </div>
      </div>
      ${pm.sofi?'<div style="font-family:var(--mono);font-size:8px;color:var(--red);margin-top:3px;">⚠ Extreme odds + thin volume — SOFI pattern</div>':''}`;
  }

  // Earnings surprise dots
  let surpHtml='<div style="font-family:var(--mono);font-size:9px;color:var(--ink3)">No history available</div>';
  if(surps.length){
    const dots=surps.slice(0,6).map(s=>{
      const cls=s.actualEarningResult>s.estimatedEarning?'beat':s.actualEarningResult<s.estimatedEarning?'miss':'meet';
      const sym=s.actualEarningResult>s.estimatedEarning?'✓':s.actualEarningResult<s.estimatedEarning?'✗':'=';
      return `<span class="surp-dot ${cls}">${sym}</span>`;
    }).join('');
    surpHtml=`<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
      <span style="font-family:var(--mono);font-size:8px;color:var(--ink3);margin-right:2px">LAST ${surps.length}Q:</span>
      ${dots}
      <span style="font-family:var(--mono);font-size:9px;color:var(--ink3)">${surpBeats}/${surps.length} beats</span>
    </div>`;
  }

  // Insider HTML
  let insHtml='<div style="font-family:var(--mono);font-size:9px;color:var(--ink3);padding:2px 0">No recent insider activity</div>';
  if(insiders.length){
    insHtml=insiders.slice(0,3).map(i=>{
      const isBuy=(i.transactionType||'').toLowerCase().includes('p-purchase')||(i.transactionType||'').toLowerCase().includes('buy');
      const name=(i.reportingName||'Insider').split(' ').slice(-1)[0];
      const dt=i.transactionDate?i.transactionDate.slice(5):'';
      const shares=i.sharesNumber?fmtV(Math.abs(i.sharesNumber)):'—';
      return `<div class="ins-item"><span class="ins-name">${name} ${dt}</span><span class="ins-badge ${isBuy?'buy':'sell'}">${isBuy?'BUY':'SELL'} ${shares}</span></div>`;
    }).join('');
  }

  return `
<div class="card" data-ticker="${holding.t}" data-sig="${sig}" data-score="${score}"
     data-has-pm="${pm?'true':'false'}" data-insider="${insiderBuys.length>0?'true':'false'}"
     data-aristocrat="${isAristocrat?'true':'false'}">
  <div class="card-header">
    <div>
      <div><span class="ticker">${holding.t}</span><span class="s-tag">${holding.s}</span></div>
      <div class="cname">${holding.n}</div>
    </div>
    <div class="price-blk">
      <div class="cprice">${price?'$'+f2(price):'—'}</div>
      <div class="cchg ${(chg||0)>=0?'up':'dn'}">${chg!=null?((chg>=0?'+':'')+f2(chg)+' ('+pct(chgP)+')'):'—'}</div>
    </div>
  </div>

  <div class="sec-title">FUNDAMENTALS (TTM)</div>
  <div class="fund-grid">
    <div class="fund-item"><div class="f-lbl2">P/E Ratio</div><div class="f-val ${peC}">${(pe||fmpQ.pe)?f1(pe||fmpQ.pe):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Price/Book</div><div class="f-val ${pbC}">${pb?f2(pb):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">ROE</div><div class="f-val ${roeC}">${roe?f1(roe)+'%':'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">ROIC</div><div class="f-val ${roicC}">${roic?f1(roic)+'%':'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Debt/Equity</div><div class="f-val ${deC}">${de!=null?f2(de):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">FCF Yield</div><div class="f-val ${fcfC}">${fcfY?f1(fcfY)+'%':'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">52W High</div><div class="f-val n">${high52?'$'+f2(high52):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">52W Low</div><div class="f-val ${high52&&low52&&price?(((price-low52)/(high52-low52))<0.3?'g':'n'):'n'}">${low52?'$'+f2(low52):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Div Yield</div><div class="f-val ${divC}">${divYield>0?f2(divYield)+'%':'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Payout Ratio</div><div class="f-val ${payoutR>0&&payoutR<60?'g':payoutR>80?'r':'n'}">${payoutR>0?f1(payoutR)+'%':'—'}</div></div>
  </div>

  <div class="score-wrap">
    <div class="score-hdr">
      <span class="score-lbl">Buffett Value Score</span>
      <span class="score-num" style="color:${scColor}">${score}/100</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" style="width:${score}%;background:${scColor}"></div></div>
  </div>

  <div class="sec-title">EARNINGS SURPRISE HISTORY</div>
  <div style="padding:8px 16px;border-bottom:1px solid var(--border)">${surpHtml}</div>

  <div class="sec-title">POLYMARKET EARNINGS ODDS</div>
  <div class="pm-section">${pmHtml}</div>

  <div class="sec-title">DIVIDEND</div>
  <div class="div-row">
    <div class="div-info">${divYield>0?f2(divYield)+'% yield · '+f1(payoutR)+'% payout':'No dividend'}${divHistLen>0?' · '+divHistLen+'+ qtrs':''}</div>
    <span class="div-badge ${isAristocrat?'aristocrat':divYield>0?'grower':'none'}">${isAristocrat?'★ ARISTOCRAT':divYield>0?'DIVIDEND':'NO DIV'}</span>
  </div>

  <div class="sec-title">RECENT INSIDER ACTIVITY</div>
  <div style="padding:8px 16px;border-bottom:1px solid var(--border)">${insHtml}</div>

  <div class="card-footer">
    <span class="sig-badge ${sig}">${lbl}</span>
    <button class="copy-btn" onclick="copyTick('${holding.t}',this)">copy ↗</button>
  </div>
</div>`;
}

function copyTick(t,btn){
  navigator.clipboard?.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy ↗',1500);}).catch(()=>alert(t));
}

function renderCards(){
  const grid=document.getElementById('grid');
  let cards=[...allData];
  if(activeFilter==='buy') cards=cards.filter(d=>['strong-buy','buy'].includes(d.signal?.sig));
  else if(activeFilter==='value') cards.sort((a,b)=>valueScore(b.snap,b.fund)-valueScore(a.snap,a.fund));
  else if(activeFilter==='earnings') cards=cards.filter(d=>d.pmOdds!=null);
  else if(activeFilter==='beat') cards=cards.filter(d=>{const p=parsePM(d.pmOdds);return p&&p.yesPct>=70&&p.vw>=40;});
  else if(activeFilter==='insider') cards=cards.filter(d=>(d.fund?.insider||[]).some(i=>(i.transactionType||'').toLowerCase().includes('p-purchase')));
  else if(activeFilter==='dividend') cards=cards.filter(d=>((d.fund?.metrics?.dividendYieldTTM||0)*100)>1&&(d.fund?.dividends?.historical?.length||0)>40);

  if(!cards.length&&allData.length>0){grid.innerHTML='<div class="empty">No stocks match this filter.</div>';return;}

  grid.innerHTML=cards.map(d=>{
    if(d.fund) return renderCard(d);
    const day=d.snap?.day||{};
    const fQ=d.snap?._fmp||{};
    const pr=day.c||d.snap?.lastTrade?.p;
    const pv=d.snap?.prevDay?.c;
    const ch=fQ.change!=null?fQ.change:(pr&&pv?pr-pv:null);
    const cp=fQ.changePct!=null?fQ.changePct:(pv&&ch?(ch/pv)*100:null);
    return `<div class="card" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div class="ticker">${d.holding.t}<span class="s-tag">${d.holding.s}</span></div><div class="cname">${d.holding.n}</div></div>
        ${pr?`<div style="text-align:right"><div class="cprice">$${f2(pr)}</div><div class="cchg ${(ch||0)>=0?'up':'dn'}">${ch!=null?((ch>=0?'+':'')+f2(ch)+' ('+pct(cp)+')'):'—'}</div></div>`:'<div style="font-family:var(--mono);font-size:10px;color:var(--ink3)">Loading...</div>'}
      </div>
      <div class="skeleton" style="height:8px;margin-bottom:5px"></div>
      <div class="skeleton" style="height:8px;width:65%;margin-bottom:5px"></div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:4px">⏳ Loading fundamentals...</div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function updateSummary(){
  let buys=0,watches=0,avoids=0,earnings=0,beats=0,insiders=0,aristocrats=0;
  allData.forEach(d=>{
    const s=d.signal?.sig;
    if(s==='strong-buy'||s==='buy')buys++;
    if(s==='watch')watches++;
    if(s==='avoid')avoids++;
    const pm=parsePM(d.pmOdds);
    if(pm){earnings++;if(pm.yesPct>=75&&pm.vw>=45)beats++;}
    if((d.fund?.insider||[]).some(i=>(i.transactionType||'').toLowerCase().includes('p-purchase')))insiders++;
    const dy=((d.fund?.metrics?.dividendYieldTTM||0))*100;
    if(dy>1&&(d.fund?.dividends?.historical?.length||0)>80)aristocrats++;
  });
  document.getElementById('sBuy').textContent=buys;
  document.getElementById('sWatch').textContent=watches;
  document.getElementById('sAvoid').textContent=avoids;
  document.getElementById('sEarnings').textContent=earnings;
  document.getElementById('sBeat').textContent=beats;
  document.getElementById('sInsider').textContent=insiders;
  document.getElementById('sAristocrat').textContent=aristocrats;
}

async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spin');
  allData=[];

  // Show skeleton cards immediately
  document.getElementById('grid').innerHTML=HOLDINGS.map(h=>`
    <div class="card" style="padding:16px" id="card-${h.t}">
      <div class="ticker" style="color:var(--ink3);margin-bottom:6px">${h.t} <span class="s-tag">${h.s}</span></div>
      <div class="cname" style="margin-bottom:8px">${h.n}</div>
      <div class="skeleton" style="height:8px;margin-bottom:5px"></div>
      <div class="skeleton" style="height:8px;width:60%;margin-bottom:5px"></div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:4px">⏳ Waiting...</div>
    </div>`).join('');

  HOLDINGS.forEach(h=>allData.push({
    holding:h, snap:null, fund:null, pmOdds:null, signal:{sig:'hold',lbl:'HOLD'}
  }));

  // Load ONE stock at a time — price + fundamentals + polymarket per stock
  // then wait 25s before next to stay well under FMP rate limits
  for(let i=0;i<HOLDINGS.length;i++){
    const h=HOLDINGS[i];
    document.getElementById('lastUpd').textContent=`Loading ${h.t} (${i+1}/15)...`;

    try{
      // Step A: FMP quote (price + basic metrics) — 1 call
      let snap=null;
      try{
        const qRes=await fetch(`${FMP}/quote?symbol=${h.t}&apikey=${FMP_KEY}`);
        const qData=await qRes.json();
        if(Array.isArray(qData)&&qData.length){
          const q=qData[0];
          snap={
            day:{c:q.price,o:q.open,h:q.dayHigh,l:q.dayLow,v:q.volume,vw:null},
            prevDay:{c:q.previousClose},
            lastTrade:{p:q.price},
            _fmp:{pe:q.pe,eps:q.eps,marketCap:q.marketCap,high52:q.yearHigh,low52:q.yearLow,change:q.change,changePct:q.changesPercentage}
          };
        }
      }catch(e){console.warn(`Quote ${h.t}:`,e);}

      await delay(2000);

      // Step B: Key metrics (1 call)
      let metrics=null;
      try{
        const mRes=await fetch(`${FMP}/key-metrics-ttm?symbol=${h.t}&apikey=${FMP_KEY}`);
        const mData=await mRes.json();
        metrics=Array.isArray(mData)&&mData.length?mData[0]:null;
        if(metrics) console.log(`[${h.t} metrics keys]`,Object.keys(metrics).filter(k=>metrics[k]!=null&&metrics[k]!==0).slice(0,10));
      }catch(e){console.warn(`Metrics ${h.t}:`,e);}

      await delay(2000);

      // Step C: Ratios (1 call)
      let ratios=null;
      try{
        const rRes=await fetch(`${FMP}/ratios-ttm?symbol=${h.t}&apikey=${FMP_KEY}`);
        const rData=await rRes.json();
        ratios=Array.isArray(rData)&&rData.length?rData[0]:null;
      }catch(e){console.warn(`Ratios ${h.t}:`,e);}

      await delay(2000);

      // Step D: Earnings surprises (1 call)
      let surprises=[];
      try{
        const sRes=await fetch(`${FMP}/earnings-surprises?symbol=${h.t}&apikey=${FMP_KEY}`);
        const sData=await sRes.json();
        surprises=Array.isArray(sData)?sData:[];
      }catch(e){console.warn(`Surprises ${h.t}:`,e);}

      await delay(2000);

      // Step E: Insider trading (1 call)
      let insider=[];
      try{
        const iRes=await fetch(`${FMP}/insider-trading?symbol=${h.t}&limit=10&apikey=${FMP_KEY}`);
        const iData=await iRes.json();
        insider=Array.isArray(iData)?iData:[];
      }catch(e){console.warn(`Insider ${h.t}:`,e);}

      await delay(2000);

      // Step F: Dividends (1 call)
      let dividends=null;
      try{
        const dRes=await fetch(`${FMP}/dividends?symbol=${h.t}&apikey=${FMP_KEY}`);
        const dData=await dRes.json();
        dividends=dData?.historical?dData:null;
      }catch(e){console.warn(`Dividends ${h.t}:`,e);}

      await delay(2000);

      // Step G: Polymarket (external, no rate limit concern)
      let pmOdds=null;
      try{ pmOdds=await fetchPolymarket(h.t,h.n); }catch(e){}

      // Assemble fund object
      const fund={metrics,ratios,income:[],surprises,insider,dividends,profile:null};

      // Update allData
      const idx=allData.findIndex(d=>d.holding.t===h.t);
      if(idx>=0){
        allData[idx].snap=snap;
        allData[idx].fund=fund;
        allData[idx].pmOdds=pmOdds;
        const sc=valueScore(snap,fund);
        const pmP=parsePM(pmOdds);
        const ins=insider.filter(x=>(x.transactionType||'').toLowerCase().includes('p-purchase'));
        allData[idx].signal=getSignal(sc,pmP,ins.length,0,0);
        renderCards();
        updateSummary();
      }

    }catch(e){console.warn(`Error ${h.t}:`,e);}

    // Wait between stocks — 6 calls per stock, need ~72s for 5/min limit
    // But we use 2s between each call above (6×2=12s of calls)
    // Then wait additional 13s = ~25s total per stock
    if(i<HOLDINGS.length-1){
      for(let s=13;s>0;s--){
        document.getElementById('lastUpd').textContent=`${h.t} done · next in ${s}s (${i+2}/15)`;
        await delay(1000);
      }
    }
  }

  updateSummary();
  document.getElementById('lastUpd').textContent='Updated '+nowStr();
  btn.classList.remove('spin');
}

loadAll();
</script>
</body>
</html>
