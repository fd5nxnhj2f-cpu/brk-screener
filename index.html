// ── SEC EDGAR data fetcher ────────────────────────────────────────────────────
async function fetchSECFacts(cik) {
  // SEC EDGAR companyfacts — free, no key, no rate limit
  // Returns all XBRL financial data filed with SEC
  const url = `https://data.sec.gov/api/xbrl/companyfacts/CIK${cik}.json`;
  const res = await fetch(url, {
    headers: {
      'User-Agent': 'BRK Value Screener contact@example.com',
      'Accept': 'application/json',
    }
  });
  if (!res.ok) throw new Error(`SEC ${res.status}`);
  return res.json();
}

function getLatestAnnual(facts, concept, unit='USD') {
  // Extract most recent annual (10-K) value for a given XBRL concept
  try {
    const data = facts?.['us-gaap']?.[concept]?.units?.[unit];
    if (!data) return null;
    // Filter to annual (10-K) filings only, sort by end date
    const annual = data
      .filter(d => d.form === '10-K' && d.val != null)
      .sort((a,b) => new Date(b.end) - new Date(a.end));
    return annual.length ? annual[0].val : null;
  } catch(e) { return null; }
}

function getLatestQuarterly(facts, concept, unit='USD') {
  // Get last 4 quarters and sum for TTM
  try {
    const data = facts?.['us-gaap']?.[concept]?.units?.[unit];
    if (!data) return null;
    const qtrs = data
      .filter(d => (d.form === '10-Q' || d.form === '10-K') && d.val != null)
      .sort((a,b) => new Date(b.end) - new Date(a.end));
    // Take most recent non-overlapping quarters
    const seen = new Set();
    const unique = [];
    for (const q of qtrs) {
      if (!seen.has(q.end) && unique.length < 4) {
        seen.add(q.end);
        unique.push(q);
      }
    }
    return unique.length === 4 ? unique.reduce((s,q)=>s+q.val,0) : (unique[0]?.val||null);
  } catch(e) { return null; }
}

function parseSECFacts(facts, ticker, price, sharesOut) {
  const ga = (concept, unit='USD') => getLatestAnnual(facts, concept, unit);
  const gq = (concept, unit='USD') => getLatestQuarterly(facts, concept, unit);

  // Revenue — different companies use different concepts
  const revenue = gq('Revenues') || gq('RevenueFromContractWithCustomerExcludingAssessedTax') ||
                  gq('SalesRevenueNet') || gq('RevenueFromContractWithCustomerIncludingAssessedTax') || 0;

  const netIncome    = gq('NetIncomeLoss') || 0;
  const grossProfit  = gq('GrossProfit') || 0;
  const opIncome     = gq('OperatingIncomeLoss') || 0;
  const ebitda       = opIncome + (gq('DepreciationDepletionAndAmortization') || gq('Depreciation') || 0);

  const totalAssets  = ga('Assets') || 0;
  const equity       = ga('StockholdersEquity') || ga('StockholdersEquityAttributableToParent') || 0;
  const longTermDebt = ga('LongTermDebt') || ga('LongTermDebtNoncurrent') || 0;
  const cash         = ga('CashAndCashEquivalentsAtCarryingValue') || ga('CashCashEquivalentsAndShortTermInvestments') || 0;
  const curAssets    = ga('AssetsCurrent') || 0;
  const curLiab      = ga('LiabilitiesCurrent') || 0;

  const eps          = gq('EarningsPerShareBasic','USD/shares') || gq('EarningsPerShareDiluted','USD/shares') || 0;
  const bookPerShare = equity && sharesOut ? equity / sharesOut : 0;
  const divPerShare  = gq('CommonStockDividendsPerShareDeclared','USD/shares') ||
                       gq('CommonStockDividendsPerShareCashPaid','USD/shares') || 0;

  // Derived metrics
  const shares   = sharesOut || (ga('CommonStockSharesOutstanding','shares') || 0);
  const mktCap   = price && shares ? price * shares : 0;
  const netDebt  = longTermDebt - cash;
  const ev       = mktCap + netDebt;

  const metrics = {
    evToEBITDATTM:        ebitda   > 0 ? ev/ebitda        : null,
    evToFreeCashFlowTTM:  null, // computed below if FCF available
    evToSalesTTM:         revenue  > 0 ? ev/revenue        : null,
    netDebtToEBITDATTM:   ebitda   > 0 ? netDebt/ebitda    : null,
    currentRatioTTM:      curLiab  > 0 ? curAssets/curLiab : null,
    debtToEquityTTM:      equity   > 0 ? longTermDebt/equity: null,
    grahamNumberTTM:      (eps>0 && bookPerShare>0) ? Math.sqrt(22.5*eps*bookPerShare) : null,
    dividendYieldTTM:     price    > 0 ? divPerShare/price  : 0,
    returnOnEquityTTM:    equity   > 0 ? netIncome/equity   : null,
    mktCap, revenue, netIncome, equity, ebitda, longTermDebt, cash, eps, divPerShare, bookPerShare,
  };

  const ratios = {
    grossProfitMarginTTM:     revenue>0 ? grossProfit/revenue  : null,
    operatingProfitMarginTTM: revenue>0 ? opIncome/revenue     : null,
    netProfitMarginTTM:       revenue>0 ? netIncome/revenue    : null,
    ebitdaMarginTTM:          revenue>0 ? ebitda/revenue       : null,
  };

  return { metrics, ratios };
}

// ── Price fetcher (Yahoo Finance unofficial — no key, browser-friendly) ───────
async function fetchPrice(ticker) {
  // Use Yahoo Finance v8 chart endpoint — works from browsers, no auth needed
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2d`;
    const res = await fetch(url, {
      headers: {'Accept': 'application/json', 'User-Agent': 'Mozilla/5.0'}
    });
    if (!res.ok) throw new Error(`Yahoo ${res.status}`);
    const data = await res.json();
    const meta = data?.chart?.result?.[0]?.meta;
    if (!meta) throw new Error('No meta');
    const price  = meta.regularMarketPrice || meta.previousClose;
    const prev   = meta.chartPreviousClose || meta.previousClose;
    const change = price && prev ? price - prev : null;
    const changePct = prev && change ? (change/prev)*100 : null;
    const shares = meta.sharesOutstanding || null;
    return {
      price, change, changePct, prev,
      high52: meta.fiftyTwoWeekHigh,
      low52:  meta.fiftyTwoWeekLow,
      vol:    meta.regularMarketVolume,
      shares,
    };
  } catch(e) {
    dbg(`${ticker} price error: ${e.message}`);
    return null;
  }
}

// ── Value Score ───────────────────────────────────────────────────────────────
function valueScore(quote, fund) {
  let s = 50;
  const m = fund?.metrics || {};
  const r = fund?.ratios  || {};
  const q = quote || {};

  const evEbitda = m.evToEBITDATTM;
  if (evEbitda && evEbitda > 0) s += evEbitda<10?18:evEbitda<15?10:evEbitda<20?3:evEbitda<30?-3:-10;

  const evSales = m.evToSalesTTM;
  if (evSales && evSales > 0) s += evSales<2?12:evSales<4?6:evSales<8?0:evSales<15?-4:-8;

  const graham = m.grahamNumberTTM;
  if (graham && graham > 0 && q.price) {
    const diff = (q.price - graham) / graham * 100;
    s += diff<-30?20:diff<-15?14:diff<0?8:diff<15?0:diff<30?-5:-12;
  }

  const gpm = r.grossProfitMarginTTM;
  if (gpm) s += gpm>0.6?15:gpm>0.4?8:gpm>0.25?2:gpm>0.15?-2:-8;

  const npm = r.netProfitMarginTTM;
  if (npm) s += npm>0.25?10:npm>0.15?6:npm>0.08?2:npm>0?-2:-8;

  const roe = m.returnOnEquityTTM;
  if (roe) { const p=roe*100; s += p>20?10:p>15?6:p>10?3:p>0?0:-5; }

  const cr = m.currentRatioTTM;
  if (cr) s += cr>2?6:cr>1.5?4:cr>1?1:cr>0.7?-3:-6;

  const de = m.debtToEquityTTM;
  if (de != null) s += de<0.5?8:de<1?4:de<2?0:de<3?-4:-8;

  if (q.high52 && q.low52 && q.price) {
    const pos = (q.price-q.low52)/(q.high52-q.low52||0.01);
    s += pos<0.2?15:pos<0.35?8:pos>0.85?-10:pos>0.7?-4:0;
  }

  return Math.max(0, Math.min(100, Math.round(s)));
}

function getSignal(score, belowGraham) {
  if (score >= 72) return {sig:'strong-buy', lbl:'★ STRONG BUY'};
  if (score >= 60) return {sig:'buy',        lbl:'▲ BUY'};
  if (belowGraham && score >= 50) return {sig:'buy', lbl:'▲ BUY (GRAHAM)'};
  if (score <= 32) return {sig:'avoid',      lbl:'✗ AVOID'};
  if (score <= 42) return {sig:'watch',      lbl:'⚠ WATCH'};
  return {sig:'hold', lbl:'HOLD'};
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(d) {
  const {holding, quote, fund, signal} = d;
  const q = quote || {};
  const m = fund?.metrics || {};
  const r = fund?.ratios  || {};
  const score = valueScore(q, fund);
  const graham = m.grahamNumberTTM;
  const belowGraham = graham && q.price && q.price < graham;
  const {sig, lbl} = signal || getSignal(score, belowGraham);
  const scColor = score>=65?'#2d6a4f':score>=50?'#b5890a':'#c1440e';

  const evEbitda = m.evToEBITDATTM;
  const evSales  = m.evToSalesTTM;
  const netDebtEbitda = m.netDebtToEBITDATTM;
  const cr  = m.currentRatioTTM;
  const de  = m.debtToEquityTTM;
  const roe = (m.returnOnEquityTTM||0)*100;
  const gpm = r.grossProfitMarginTTM;
  const opm = r.operatingProfitMarginTTM;
  const npm = r.netProfitMarginTTM;
  const divY = (m.dividendYieldTTM||0)*100;
  const divAmt = m.divPerShare||0;

  const pos52 = q.high52&&q.low52&&q.price ? Math.round((q.price-q.low52)/(q.high52-q.low52)*100) : null;
  const pos52C = pos52!=null ? (pos52<25?'g':pos52>75?'r':'n') : 'n';
  const graham_pct = graham&&q.price ? ((q.price-graham)/graham*100) : null;
  const graham_color = belowGraham ? 'var(--green)' : graham ? 'var(--red)' : 'var(--ink3)';

  return `<div class="card" data-sig="${sig}" data-score="${score}" data-graham="${belowGraham?'true':'false'}" data-gpm="${(gpm||0)>0.4?'true':'false'}" data-div="${divY>0?'true':'false'}" data-chgpct="${q.changePct||0}">
  <div class="card-header">
    <div><div><span class="ticker">${holding.t}</span><span class="s-tag">${holding.s}</span></div><div class="cname">${holding.n}</div></div>
    <div class="price-blk">
      <div class="cprice">${q.price?'$'+f2(q.price):'—'}</div>
      <div class="cchg ${(q.change||0)>=0?'up':'dn'}">${q.change!=null?((q.change>=0?'+':'')+f2(q.change)+' ('+pct(q.changePct)+')'):'—'}</div>
    </div>
  </div>
  <div class="sec-title">PRICE CONTEXT</div>
  <div class="fund-grid">
    <div class="fund-item"><div class="f-lbl2">52W Low</div><div class="f-val n">${q.low52?'$'+f2(q.low52):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">52W High</div><div class="f-val n">${q.high52?'$'+f2(q.high52):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">52W Position</div><div class="f-val ${pos52C}">${pos52!=null?pos52+'% of range':'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Market Cap</div><div class="f-val n">${B(m.mktCap)}</div></div>
  </div>
  <div class="sec-title">VALUATION (TTM · SEC EDGAR)</div>
  <div class="fund-grid">
    <div class="fund-item"><div class="f-lbl2">EV/EBITDA</div><div class="f-val ${evEbitda?(evEbitda<15?'g':evEbitda<25?'n':'r'):'n'}">${evEbitda?f1(evEbitda):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">EV/Sales</div><div class="f-val ${evSales?(evSales<3?'g':evSales<8?'n':'r'):'n'}">${evSales?f1(evSales):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Net Debt/EBITDA</div><div class="f-val ${netDebtEbitda!=null?(netDebtEbitda<1?'g':netDebtEbitda<3?'n':'r'):'n'}">${netDebtEbitda!=null?f1(netDebtEbitda):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Debt/Equity</div><div class="f-val ${de!=null?(de<1?'g':de<2?'n':'r'):'n'}">${de!=null?f2(de):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">Current Ratio</div><div class="f-val ${cr?(cr>1.5?'g':cr>1?'n':'r'):'n'}">${cr?f2(cr):'—'}</div></div>
    <div class="fund-item"><div class="f-lbl2">ROE</div><div class="f-val ${roe>15?'g':roe>8?'n':roe>0?'r':'n'}">${roe?f1(roe)+'%':'—'}</div></div>
  </div>
  <div class="sec-title">PROFITABILITY & MOAT (TTM)</div>
  <div class="fund-grid">
    <div class="fund-item"><div class="f-lbl2">Gross Margin</div><div class="f-val ${gpm?(gpm>0.5?'g':gpm>0.3?'n':'r'):'n'}">${pct1(gpm)}</div></div>
    <div class="fund-item"><div class="f-lbl2">Operating Margin</div><div class="f-val ${opm?(opm>0.2?'g':opm>0.1?'n':'r'):'n'}">${pct1(opm)}</div></div>
    <div class="fund-item"><div class="f-lbl2">Net Margin</div><div class="f-val ${npm?(npm>0.15?'g':npm>0.08?'n':'r'):'n'}">${pct1(npm)}</div></div>
    <div class="fund-item"><div class="f-lbl2">Revenue (TTM)</div><div class="f-val n">${B(m.revenue)}</div></div>
    <div class="fund-item"><div class="f-lbl2">Net Income (TTM)</div><div class="f-val ${(m.netIncome||0)>0?'g':'r'}">${B(m.netIncome)}</div></div>
    <div class="fund-item"><div class="f-lbl2">EPS</div><div class="f-val ${(m.eps||0)>0?'g':'r'}">${m.eps?'$'+f2(m.eps):'—'}</div></div>
  </div>
  <div class="graham-wrap">
    <div>
      <div style="font-family:var(--mono);font-size:8px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px">Graham Number</div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--ink3);margin-top:1px">Benjamin Graham fair value (√22.5×EPS×BV)</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:var(--mono);font-size:13px;color:${graham_color}">${graham?'$'+f2(graham):'—'}</div>
      ${graham_pct!=null?`<div style="font-family:var(--mono);font-size:9px;color:${graham_color}">${belowGraham?'▼ ':'▲ '}${Math.abs(graham_pct).toFixed(1)}% ${belowGraham?'below':'above'} Graham</div>`:''}
    </div>
  </div>
  <div class="score-wrap">
    <div class="score-hdr"><span class="score-lbl">Buffett Value Score</span><span class="score-num" style="color:${scColor}">${score}/100</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${score}%;background:${scColor}"></div></div>
  </div>
  <div class="sec-title">DIVIDEND</div>
  <div class="div-row">
    <div class="div-info">${divY>0?f2(divY)+'% yield · $'+f2(divAmt)+'/share':'No dividend data'}</div>
    <span class="div-badge ${divY>2.5?'a':divY>0?'d':'n'}">${divY>2.5?'★ HIGH YIELD':divY>0?'DIVIDEND':'NO DIV'}</span>
  </div>
  <div style="padding:4px 16px;background:var(--surface2);border-bottom:1px solid var(--border);">
    <div style="font-family:var(--mono);font-size:8px;color:var(--ink3)">Source: SEC EDGAR (${holding.cik}) · Data as of latest 10-K/10-Q filing</div>
  </div>
  <div class="card-footer">
    <span class="sig-badge ${sig}">${lbl}</span>
    <button class="copy-btn" onclick="copyTick('${holding.t}',this)">copy ↗</button>
  </div>
</div>`;
}

function renderPriceCard(d) {
  const q = d.quote || {};
  const pos52 = q.high52&&q.low52&&q.price ? Math.round((q.price-q.low52)/(q.high52-q.low52)*100) : null;
  return `<div class="card" style="padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
      <div><div><span class="ticker">${d.holding.t}</span><span class="s-tag">${d.holding.s}</span></div><div class="cname">${d.holding.n}</div></div>
      <div class="price-blk">
        <div class="cprice">${q.price?'$'+f2(q.price):'Loading...'}</div>
        <div class="cchg ${(q.change||0)>=0?'up':'dn'}">${q.change!=null?((q.change>=0?'+':'')+f2(q.change)+' ('+pct(q.changePct)+')'):'—'}</div>
      </div>
    </div>
    ${q.high52?`<div style="font-family:var(--mono);font-size:9px;color:var(--ink3);margin-bottom:6px">52W: $${f2(q.low52)} — $${f2(q.high52)} · <span style="color:${pos52<25?'var(--green)':pos52>75?'var(--red)':'var(--ink3)'}">${pos52!=null?pos52+'% of range':'—'}</span></div>`:''}
    <div class="skeleton" style="height:6px;margin-bottom:5px"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
      <span style="font-family:var(--mono);font-size:9px;color:var(--ink3)">⏳ Loading SEC EDGAR data...</span>
      <button class="load-btn" onclick="loadOneFund('${d.holding.t}')">Load Now</button>
    </div>
  </div>`;
}

function copyTick(t,btn){navigator.clipboard?.writeText(t).then(()=>{btn.textContent='copied!';setTimeout(()=>btn.textContent='copy ↗',1500);}).catch(()=>alert(t));}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('grid');
  let cards = [...allData];
  if (activeFilter==='buy')      cards = cards.filter(d=>['strong-buy','buy'].includes(d.signal?.sig));
  else if (activeFilter==='value') cards.sort((a,b)=>valueScore(b.quote,b.fund)-valueScore(a.quote,a.fund));
  else if (activeFilter==='graham') cards = cards.filter(d=>{const m=d.fund?.metrics||{};const q=d.quote||{};return m.grahamNumberTTM&&q.price&&q.price<m.grahamNumberTTM;});
  else if (activeFilter==='moat')   cards = cards.filter(d=>(d.fund?.ratios?.grossProfitMarginTTM||0)>0.4);
  else if (activeFilter==='dividend') cards = cards.filter(d=>(d.fund?.metrics?.dividendYieldTTM||0)>0.005);
  else if (activeFilter==='momentum') {
    cards = cards.filter(d=>(d.quote?.changePct||0)>0).sort((a,b)=>{
      const aPos=a.quote?.high52&&a.quote?.low52?((a.quote.price-a.quote.low52)/(a.quote.high52-a.quote.low52)):0;
      const bPos=b.quote?.high52&&b.quote?.low52?((b.quote.price-b.quote.low52)/(b.quote.high52-b.quote.low52)):0;
      return bPos-aPos;
    });
  }
  if (!cards.length && allData.some(d=>d.quote)) {grid.innerHTML='<div class="empty">No stocks match this filter.</div>';return;}
  if (!allData.some(d=>d.quote)) {grid.innerHTML='<div class="empty">Tap ↻ REFRESH to load data<br><span style="font-size:10px">Source: SEC EDGAR · Free · No API key · No rate limits</span></div>';return;}
  grid.innerHTML = cards.map(d=>d.fund?renderCard(d):renderPriceCard(d)).join('');
}

function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards();}

function switchTab(tab) {
  activeTab = tab;
  HOLDINGS = tab==='brk' ? BRK_HOLDINGS : MEGA_HOLDINGS;
  document.getElementById('tab-brk').classList.toggle('active', tab==='brk');
  document.getElementById('tab-mega').classList.toggle('active', tab==='mega');
  document.getElementById('sTotal').textContent = HOLDINGS.length;
  document.querySelectorAll('.f-btn').forEach((b,i)=>{b.classList.toggle('active',i===0);});
  activeFilter='all';
  allData=[];
  document.getElementById('grid').innerHTML='<div class="empty">Loading '+HOLDINGS.length+' stocks...</div>';
  loadAll();
}

function updateSummary() {
  let buys=0,watches=0,avoids=0,grahams=0,divs=0;
  allData.forEach(d=>{
    if (!d.fund) return;
    const s=d.signal?.sig;
    if (s==='strong-buy'||s==='buy') buys++;
    if (s==='watch') watches++;
    if (s==='avoid') avoids++;
    const m=d.fund.metrics||{};
    if (m.grahamNumberTTM&&d.quote?.price&&d.quote.price<m.grahamNumberTTM) grahams++;
    if ((m.dividendYieldTTM||0)>0.005) divs++;
  });
  document.getElementById('sBuy').textContent=buys;
  document.getElementById('sWatch').textContent=watches;
  document.getElementById('sAvoid').textContent=avoids;
  document.getElementById('sGraham').textContent=grahams;
  document.getElementById('sDivs').textContent=divs;
}

async function loadOneFund(ticker) {
  const idx = allData.findIndex(d=>d.holding.t===ticker);
  if (idx<0) return;
  const holding = allData[idx].holding;
  const quote   = allData[idx].quote;
  dbg(`Loading SEC data for ${ticker}...`);
  try {
    const facts = await fetchSECFacts(holding.cik);
    const fund  = parseSECFacts(facts, ticker, quote?.price, quote?.shares);
    allData[idx].fund = fund;
    const sc = valueScore(quote, fund);
    const m  = fund?.metrics||{};
    const belowGraham = m.grahamNumberTTM&&quote?.price&&quote.price<m.grahamNumberTTM;
    allData[idx].signal = getSignal(sc, belowGraham);
    dbg(`${ticker}: SEC data loaded ✓`);
    renderCards();
    updateSummary();
  } catch(e) {
    dbg(`${ticker}: SEC error — ${e.message}`);
  }
}

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  allData = [];
  HOLDINGS.forEach(h=>allData.push({holding:h,quote:null,fund:null,signal:{sig:'hold',lbl:'HOLD'}}));
  document.getElementById('sTotal').textContent = HOLDINGS.length;

  // Phase 1: All prices via Yahoo Finance (fast, parallel for first 5 then sequential)
  dbg('Loading prices from Yahoo Finance...');
  const pricePromises = HOLDINGS.map(async (h,i) => {
    await delay(i * 300); // stagger requests slightly
    const q = await fetchPrice(h.t);
    const idx = allData.findIndex(d=>d.holding.t===h.t);
    if (idx>=0) { allData[idx].quote=q; renderCards(); }
  });
  await Promise.all(pricePromises);
  dbg(`All prices loaded. Now fetching SEC EDGAR fundamentals...`);

  // Phase 2: SEC EDGAR fundamentals — no rate limit, load sequentially with 1s gap
  for (let i=0; i<HOLDINGS.length; i++) {
    const h = HOLDINGS[i];
    dbg(`SEC EDGAR: ${h.t} (${i+1}/${HOLDINGS.length})...`);
    try {
      const facts = await fetchSECFacts(h.cik);
      const idx   = allData.findIndex(d=>d.holding.t===h.t);
      const quote = allData[idx]?.quote;
      const fund  = parseSECFacts(facts, h.t, quote?.price, quote?.shares);
      if (idx>=0) {
        allData[idx].fund = fund;
        const sc = valueScore(quote, fund);
        const m  = fund?.metrics||{};
        const belowGraham = m.grahamNumberTTM&&quote?.price&&quote.price<m.grahamNumberTTM;
        allData[idx].signal = getSignal(sc, belowGraham);
        dbg(`${h.t}: ✓ EV/EBITDA=${fund.metrics.evToEBITDATTM?.toFixed(1)||'—'} GPM=${((fund.ratios.grossProfitMarginTTM||0)*100).toFixed(0)}%`);
        renderCards();
        updateSummary();
      }
    } catch(e) {
      dbg(`${h.t}: SEC error — ${e.message}`);
    }
    await delay(500); // small gap between SEC requests to be polite
  }

  updateSummary();
  document.getElementById('lastUpd').textContent = 'Updated '+nowStr();
  btn.classList.remove('spin');
}
</script>
